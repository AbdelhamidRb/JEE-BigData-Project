version: '3.8'

services:
  mysql-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jee26
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  springboot-app:
    build: .
    ports:
      - "9090:9090"
    depends_on:
      - mysql-db
      - hbase-master
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/jee26?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    volumes:
      - shared_logs:/app/logs

  react-app:
    build: ./frontend-ecommerce
    ports:
      - "5173:5173"
    depends_on:
      - springboot-app
    volumes:
      - ./frontend-ecommerce:/app
      - /app/node_modules

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    ports:
      - "9870:9870"
      - "8020:8020"
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - HDFS_CONF_dfs_replication=1
    volumes:
      - "/mnt/c/Users/pc/Downloads/archive:/tmp/olist"
      - hadoop_namenode_v2:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - hadoop_datanode_v2:/hadoop/dfs/data

  hbase-master:
    image: dajobe/hbase
    ports:
      - "16010:16010"
      - "9191:9191"
      - "2181:2181"
    volumes:
      - hbase_data:/data    # ← persistance HBase

  # ── Init HBase : crée les tables + démarre Thrift automatiquement ──────────
  hbase-init:
    image: dajobe/hbase
    depends_on:
      - hbase-master
    volumes:
      - ./hbase-init.sh:/hbase-init.sh
    command: >
      sh -c "
        sleep 25 &&
        hbase thrift start -p 9090 &
        sleep 10 &&
        hbase shell -e \"create 'analytics_sales_by_category', {NAME => 'stats', VERSIONS => 1}\" 2>/dev/null || true &&
        hbase shell -e \"create 'analytics_reviews_by_category', {NAME => 'stats', VERSIONS => 1}\" 2>/dev/null || true &&
        hbase shell -e \"create 'analytics_revenue_by_month', {NAME => 'stats', VERSIONS => 1}\" 2>/dev/null || true &&
        hbase shell -e \"create 'analytics_top_products', {NAME => 'info', VERSIONS => 1}\" 2>/dev/null || true &&
        hbase shell -e \"create 'analytics_sales_by_state', {NAME => 'stats', VERSIONS => 1}\" 2>/dev/null || true &&
        echo 'Tables HBase créées ✅' &&
        sleep infinity
      "
    restart: "no"

  flume:
    build:
      context: ./flume
      dockerfile: Dockerfile
    depends_on:
      - namenode
      - datanode
      - springboot-app
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - FLUME_AGENT_NAME=agent
    volumes:
      - shared_logs:/app/logs
      - ./flume/flume.conf:/opt/flume-config/flume.conf
    restart: on-failure

  # ── MapReduce : job historique lancé automatiquement au démarrage ──────────
  mapreduce:
    build:
      context: ./mapreduce
      dockerfile: Dockerfile
    depends_on:
      - namenode
      - datanode
      - hbase-master
      - hbase-init
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - HBASE_CONF_hbase_zookeeper_quorum=hbase-master
    volumes:
      - shared_logs:/app/logs
    command: >
      sh -c "
        echo 'Attente HDFS et HBase (120s)...'
        sleep 120 &&
        echo 'Création dossiers HDFS...' &&
        hadoop fs -mkdir -p hdfs://namenode:8020/data/realtime &&
        hadoop fs -mkdir -p hdfs://namenode:8020/data/historical &&
        echo 'Chargement CSV Olist...' &&
        hadoop fs -test -e hdfs://namenode:8020/data/historical/olist_orders_dataset.csv ||
        hadoop fs -put /tmp/olist/olist_orders_dataset.csv hdfs://namenode:8020/data/historical/ &&
        hadoop fs -test -e hdfs://namenode:8020/data/historical/olist_order_items_dataset.csv ||
        hadoop fs -put /tmp/olist/olist_order_items_dataset.csv hdfs://namenode:8020/data/historical/ &&
        hadoop fs -test -e hdfs://namenode:8020/data/historical/olist_order_reviews_dataset.csv ||
        hadoop fs -put /tmp/olist/olist_order_reviews_dataset.csv hdfs://namenode:8020/data/historical/ &&
        hadoop fs -test -e hdfs://namenode:8020/data/historical/olist_customers_dataset.csv ||
        hadoop fs -put /tmp/olist/olist_customers_dataset.csv hdfs://namenode:8020/data/historical/ &&
        hadoop fs -test -e hdfs://namenode:8020/data/historical/olist_products_dataset.csv ||
        hadoop fs -put /tmp/olist/olist_products_dataset.csv hdfs://namenode:8020/data/historical/ &&
        hadoop fs -test -e hdfs://namenode:8020/data/historical/product_category_name_translation.csv ||
        hadoop fs -put /tmp/olist/product_category_name_translation.csv hdfs://namenode:8020/data/historical/ &&
        echo 'Lancement job historique MapReduce...' &&
        java -jar /mapreduce/target/mapreduce-jobs-1.0.jar historical &&
        echo 'Job historique terminé ✅' &&
        sleep infinity
      "
    restart: "no"

  # ── MapReduce Watcher : déclenché par trigger à 128MB ─────────────────────
  mapreduce-watcher:
    build:
      context: ./mapreduce
      dockerfile: Dockerfile
    depends_on:
      - mapreduce
      - namenode
      - hbase-init
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - shared_logs:/app/logs
    command: >
      sh -c "
        echo 'Watcher démarré — surveillance trigger...'
        while true; do
          if [ -f /app/logs/trigger_mr.txt ]; then
            echo 'Trigger détecté → lancement MapReduce temps réel'
            rm /app/logs/trigger_mr.txt
            java -jar /mapreduce/target/mapreduce-jobs-1.0.jar realtime
            echo 'Job temps réel terminé ✅'
          fi
          sleep 30
        done
      "
    restart: always

volumes:
  mysql_data:
  hadoop_namenode_v2:
  hadoop_datanode_v2:
  hbase_data:        # ← persistance HBase
  shared_logs: