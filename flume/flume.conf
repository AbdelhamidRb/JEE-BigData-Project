agent.sources = fileSource
agent.channels = memChannel
agent.sinks = hdfsSink

agent.sources.fileSource.type = exec
agent.sources.fileSource.command = tail -F /app/logs/bigdata_events.log
agent.sources.fileSource.channels = memChannel
agent.sources.fileSource.batchSize = 20
agent.sources.fileSource.interceptors = ts
agent.sources.fileSource.interceptors.ts.type = timestamp

agent.channels.memChannel.type = memory
agent.channels.memChannel.capacity = 10000
agent.channels.memChannel.transactionCapacity = 100

agent.sinks.hdfsSink.type = hdfs
agent.sinks.hdfsSink.channel = memChannel
agent.sinks.hdfsSink.hdfs.path = hdfs://namenode:8020/data/realtime/%Y/%m/%d
agent.sinks.hdfsSink.hdfs.filePrefix = events
agent.sinks.hdfsSink.hdfs.fileSuffix = .json
agent.sinks.hdfsSink.hdfs.fileType = DataStream
agent.sinks.hdfsSink.hdfs.writeFormat = Text
agent.sinks.hdfsSink.hdfs.rollInterval = 10
agent.sinks.hdfsSink.hdfs.rollCount = 0
agent.sinks.hdfsSink.hdfs.rollSize = 0
agent.sinks.hdfsSink.hdfs.batchSize = 1