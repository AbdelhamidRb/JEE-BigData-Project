agent.sources = spoolSource
agent.channels = memChannel
agent.sinks = hdfsSink

# Spooling Directory Source — lit les fichiers archivés de 128MB
agent.sources.spoolSource.type = spooldir
agent.sources.spoolSource.spoolDir = /app/logs/archived
agent.sources.spoolSource.channels = memChannel
agent.sources.spoolSource.deletePolicy = immediate
agent.sources.spoolSource.interceptors = ts
agent.sources.spoolSource.interceptors.ts.type = timestamp

agent.channels.memChannel.type = memory
agent.channels.memChannel.capacity = 100000
agent.channels.memChannel.transactionCapacity = 10000

agent.sinks.hdfsSink.type = hdfs
agent.sinks.hdfsSink.channel = memChannel
agent.sinks.hdfsSink.hdfs.path = hdfs://namenode:8020/data/realtime/%Y/%m/%d
agent.sinks.hdfsSink.hdfs.filePrefix = events
agent.sinks.hdfsSink.hdfs.fileSuffix = .json
agent.sinks.hdfsSink.hdfs.fileType = DataStream
agent.sinks.hdfsSink.hdfs.writeFormat = Text
agent.sinks.hdfsSink.hdfs.rollSize = 134217728
agent.sinks.hdfsSink.hdfs.rollCount = 0
agent.sinks.hdfsSink.hdfs.rollInterval = 0
agent.sinks.hdfsSink.hdfs.batchSize = 1000