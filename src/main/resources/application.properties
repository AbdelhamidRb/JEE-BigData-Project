server.port=9090
# Configuration de connexion � MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jee26}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration de JPA/Hibernate (pour cr�er les tables automatiquement)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#jwt.secret=mySecretKeyMySecretKeyMySecretKey12345

# JWT Configuration
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTThatIsLongEnoughToBeSecure1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
